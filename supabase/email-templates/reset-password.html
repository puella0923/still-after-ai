<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Still After 비밀번호 재설정</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0118;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#0a0118;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:28px;font-weight:300;letter-spacing:3px;color:#F3E8FF;">Still After</p>
              <p style="margin:8px 0 0;font-size:13px;color:#C4B5FD;letter-spacing:0.5px;">당신 곁을 여전히</p>
            </td>
          </tr>

          <tr>
            <td style="background:linear-gradient(135deg,#1a0f3e 0%,#0f0520 100%);border:1px solid rgba(167,139,250,0.3);border-radius:20px;padding:40px 32px;">
              <h1 style="margin:0 0 16px;font-size:22px;font-weight:600;color:#F3E8FF;text-align:center;line-height:1.4;">
                비밀번호 재설정
              </h1>
              <p style="margin:0 0 28px;font-size:15px;color:#C4B5FD;text-align:center;line-height:1.7;">
                Still After 계정({{ .Email }})의<br />
                비밀번호 재설정을 요청하셨습니다.
              </p>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom:28px;">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background:linear-gradient(135deg,#7C3AED,#3B82F6);color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;padding:16px 40px;border-radius:12px;">
                      비밀번호 재설정하기
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#A78BFA;text-align:center;line-height:1.6;">
                요청하지 않으셨다면 이 메일을 무시해주세요.<br />
                링크는 1시간 동안 유효합니다.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding-top:32px;">
              <p style="margin:0;font-size:11px;color:rgba(124,58,237,0.6);text-align:center;">
                © Still After · {{ .SiteURL }}
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
