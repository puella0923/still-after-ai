<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1a1612;
  }
  .container {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #3a2e26 0%, #1a1410 55%, #0d0b09 100%);
    position: relative;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 80px;
    color: #e8e0d4;
    letter-spacing: 0.22em;
    margin-bottom: 18px;
  }
  .divider {
    width: 36px;
    height: 1px;
    background: #8c7b6a;
    margin-bottom: 28px;
  }
  .subtitle {
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    font-size: 28px;
    color: #b8a898;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }
  .desc {
    font-family: 'Noto Serif KR', serif;
    font-weight: 200;
    font-size: 20px;
    color: #8c7b6a;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">Still After</div>
  <div class="divider"></div>
  <div class="subtitle">아직 전하지 못한 말이 있다면</div>
  <div class="desc">천천히, 당신의 속도로</div>
</div>
</body>
</html>
